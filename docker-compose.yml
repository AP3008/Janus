version: "3.8"

services:
  janus:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./janus.toml:/etc/janus/janus.toml:ro
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
