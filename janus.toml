[server]
listen = "0.0.0.0:8080"
upstream_url = "https://api.anthropic.com"

[pipeline]
tool_dedup = true
regex_structural = true
ast_pruning = true
min_lines_for_ast = 30

[cache]
enabled = true
redis_url = "redis://127.0.0.1:6379"
similarity_cutoff = 0.85
ttl_seconds = 3600

[pricing]
input_cost_per_1k = 0.003
